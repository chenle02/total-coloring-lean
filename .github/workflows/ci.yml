name: Lean CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: lean-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    # Runs 29792338441 and 29795877319 showed that the complete gate needs
    # bounded parallelism and a longer envelope on a hosted runner.  The
    # literal full-umbrella `lake env leanchecker` is a separately recorded
    # large-memory gate; excluding it here is a runner constraint, not a
    # theorem claim.
    timeout-minutes: 300
    env:
      LAKE_JOBS: "1"
      LEAN_NUM_THREADS: "1"
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false

      - name: Reject proof placeholders and native-evaluation axioms
        shell: bash
        run: |
          if git grep -n -E \
            '(^|[^[:alnum:]_])(sorry|admit|axiom|native_decide)([^[:alnum:]_]|$)' \
            -- '*.lean'; then
            exit 1
          fi

      - uses: leanprover/lean-action@38fbc41a8c28c4cbaec22d7f7de508ec2e7c0dd9 # v1
        with:
          build: true
          mk_all-check: false
          use-mathlib-cache: true
          leanchecker: false

      - name: Ensure all files are imported
        run: lake exe mk_all --check

      - name: Check minimum-six proof objects sequentially
        shell: bash
        run: |
          lake env leanchecker TotalColoring.MinSixCageModel
          lake env leanchecker TotalColoring.MinSixCountLemmas
          lake env leanchecker TotalColoring.MinSixGuardSoundness

      - name: Check public documentation snippet
        run: lake env lean docs/examples/Quickstart.lean
